<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tracker Wydatków / Expense Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <meta name="description" content="Simple expense tracker in Polish and English. Track your income and spending easily." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --red: #ef4444;
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #273347;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #6366f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    /* HEADER */
    header {
      background: var(--card);
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .app-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .lang-toggle {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle:hover { color: var(--text); border-color: var(--accent); }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .month-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .month-btn:hover { background: var(--card2); color: var(--text); }
    .month-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      text-align: center;
    }

    /* BALANCE CARDS */
    .cards {
      padding: 20px 16px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 12px;
      border: 1px solid var(--border);
    }
    .card.main {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #312e81, #4338ca);
      border-color: transparent;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .card.main .card-label { color: #a5b4fc; }
    .card-amount {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }
    .card.main .card-amount { font-size: 32px; }
    .card-amount.income { color: var(--green); }
    .card-amount.expense { color: var(--red); }
    .balance-icon {
      font-size: 36px;
      opacity: 0.7;
    }
    .small-card-amount {
      font-size: 18px;
      font-weight: 700;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      padding: 0 16px 16px;
    }
    .progress-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      background: var(--card2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, var(--green), #16a34a);
      transition: width 0.5s ease;
    }
    .progress-fill.warning { background: linear-gradient(to right, #f59e0b, #d97706); }
    .progress-fill.danger { background: linear-gradient(to right, var(--red), #dc2626); }

    /* CATEGORIES */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px 10px;
    }
