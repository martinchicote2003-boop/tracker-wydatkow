<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Tracker Wydatków / Expense Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tracker" />
  <meta name="description" content="Simple expense tracker in Polish and English. Track your income and spending easily." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #22c55e;
      --red: #ef4444;
      --bg: #0f172a;
      --card: #1e293b;
      --card2: #273347;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --accent: #6366f1;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 100px;
    }

    /* HEADER */
    header {
      background: var(--card);
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .app-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .lang-toggle {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-toggle:hover { color: var(--text); border-color: var(--accent); }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }
    .month-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .month-btn:hover { background: var(--card2); color: var(--text); }
    .month-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      text-align: center;
    }

    /* BALANCE CARDS */
    .cards {
      padding: 20px 16px 12px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 12px;
      border: 1px solid var(--border);
    }
    .card.main {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #312e81, #4338ca);
      border-color: transparent;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .card.main .card-label { color: #a5b4fc; }
    .card-amount {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }
    .card.main .card-amount { font-size: 32px; }
    .card-amount.income { color: var(--green); }
    .card-amount.expense { color: var(--red); }
    .balance-icon {
      font-size: 36px;
      opacity: 0.7;
    }
    .small-card-amount {
      font-size: 18px;
      font-weight: 700;
    }

    /* PROGRESS BAR */
    .progress-wrap {
      padding: 0 16px 16px;
    }
    .progress-label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      background: var(--card2);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(to right, var(--green), #16a34a);
      transition: width 0.5s ease;
    }
    .progress-fill.warning { background: linear-gradient(to right, #f59e0b, #d97706); }
    .progress-fill.danger { background: linear-gradient(to right, var(--red), #dc2626); }

    /* CATEGORIES */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 16px 10px;
    }

    .categories-scroll {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar { display: none; }
    .cat-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .cat-pill:hover:not(.active) { border-color: var(--accent); color: var(--text); }

    /* TRANSACTIONS */
    .transactions {
      padding: 0 16px;
    }
    .tx-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 8px;
      border: 1px solid var(--border);
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .tx-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .tx-info { flex: 1; min-width: 0; }
    .tx-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tx-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .tx-amount {
      font-size: 15px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .tx-amount.pos { color: var(--green); }
    .tx-amount.neg { color: var(--red); }
    .tx-delete {
      background: none;
      border: none;
      color: var(--border);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .tx-delete:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 24px;
      right: 50%;
      transform: translateX(50%);
      max-width: 480px;
      width: calc(100% - 32px);
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
      transition: all 0.2s;
      z-index: 100;
    }
    .fab:hover { background: #4f46e5; transform: translateX(50%) translateY(-2px); }
    .fab:active { transform: translateX(50%) translateY(0); }

    /* MODAL */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    /* TYPE TOGGLE */
    .type-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .type-btn {
      padding: 12px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: none;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .type-btn.income.active { background: rgba(34,197,94,0.15); border-color: var(--green); color: var(--green); }
    .type-btn.expense.active { background: rgba(239,68,68,0.15); border-color: var(--red); color: var(--red); }

    /* FORM */
    .form-group { margin-bottom: 16px; }
    .form-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      display: block;
    }
    .form-input {
      width: 100%;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--muted); }
    select.form-input { cursor: pointer; }

    /* CATEGORY GRID */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    .cat-option {
      background: var(--card2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 10px 6px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-option.selected { border-color: var(--accent); background: rgba(99,102,241,0.15); }
    .cat-option-icon { font-size: 22px; margin-bottom: 4px; }
    .cat-option-name { font-size: 10px; color: var(--muted); }
    .cat-option.selected .cat-option-name { color: var(--accent); }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .submit-btn:hover { background: #4f46e5; }

    /* CHART */
    .chart-wrap {
      padding: 0 16px 16px;
    }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
      background: var(--card);
      border-radius: 12px;
      padding: 12px;
      border: 1px solid var(--border);
    }
    .bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      min-height: 2px;
      transition: height 0.5s ease;
    }
    .bar.income-bar { background: var(--green); opacity: 0.7; }
    .bar.expense-bar { background: var(--red); opacity: 0.7; }
    .bar-label { font-size: 9px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="app-title" id="appTitle">💰 Tracker Wydatków</span>
    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="cards">
  <div class="card main">
    <div>
      <div class="card-label" id="balanceLabel">Saldo / Balance</div>
      <div class="card-amount" id="balanceAmount">0,00 zł</div>
    </div>
    <div class="balance-icon">💳</div>
  </div>
  <div class="card">
    <div class="card-label" id="incomeLabel">Przychody</div>
    <div class="small-card-amount income" id="incomeAmount">0,00 zł</div>
  </div>
  <div class="card">
    <div class="card-label" id="expenseLabel">Wydatki</div>
    <div class="small-card-amount expense" id="expenseAmount">0,00 zł</div>
  </div>
  <div class="card">
    <div class="card-label" id="txLabel">Transakcje</div>
    <div class="small-card-amount" id="txCount">0</div>
  </div>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-label">
    <span id="progressLabel">Wydatki vs Przychody</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>

<div class="chart-wrap" id="chartWrap" style="display:none">
  <div class="chart-bars" id="chartBars"></div>
</div>

<div class="section-title" id="categoriesTitle">Kategorie / Categories</div>
<div class="categories-scroll" id="categoryFilter"></div>

<div class="section-title" id="txTitle">Ostatnie transakcje</div>
<div class="transactions" id="txList"></div>

<button class="fab" onclick="openModal()" id="fabBtn">
  <span style="font-size:20px">+</span>
  <span id="fabText">Dodaj transakcję</span>
</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Nowa transakcja</div>

    <div class="type-toggle">
      <button class="type-btn expense active" id="btnExpense" onclick="setType('expense')">
        📉 <span id="expenseBtnText">Wydatek</span>
      </button>
      <button class="type-btn income" id="btnIncome" onclick="setType('income')">
        📈 <span id="incomeBtnText">Przychód</span>
      </button>
    </div>

    <div class="form-group">
      <label class="form-label" id="amountLabel">Kwota (zł)</label>
      <input class="form-input" type="number" id="amountInput" placeholder="0.00" step="0.01" min="0" />
    </div>

    <div class="form-group">
      <label class="form-label" id="descLabel">Opis</label>
      <input class="form-input" type="text" id="descInput" placeholder="np. Biedronka, Wynajem..." />
    </div>

    <div class="form-group">
      <label class="form-label" id="catLabel">Kategoria</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>

    <button class="submit-btn" onclick="addTransaction()" id="submitBtn">✓ Dodaj</button>
  </div>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────────
  let lang = 'pl';
  let currentMonth = new Date().getMonth();
  let currentYear = new Date().getFullYear();
  let selectedType = 'expense';
  let selectedCat = 'food';
  let filterCat = 'all';

  const CATEGORIES = [
    { id: 'food',      icon: '🍔', pl: 'Jedzenie',    en: 'Food' },
    { id: 'transport', icon: '🚌', pl: 'Transport',   en: 'Transport' },
    { id: 'home',      icon: '🏠', pl: 'Dom',         en: 'Home' },
    { id: 'health',    icon: '💊', pl: 'Zdrowie',     en: 'Health' },
    { id: 'fun',       icon: '🎮', pl: 'Rozrywka',    en: 'Fun' },
    { id: 'clothes',   icon: '👕', pl: 'Ubrania',     en: 'Clothes' },
    { id: 'salary',    icon: '💼', pl: 'Praca',       en: 'Salary' },
    { id: 'other',     icon: '📦', pl: 'Inne',        en: 'Other' },
  ];

  const MONTHS_PL = ['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
                     'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  const MONTHS_EN = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

  // Load from localStorage
  let transactions = JSON.parse(localStorage.getItem('txData') || '[]');

  // ─── SAVE ─────────────────────────────────────────────────
  function save() {
    localStorage.setItem('txData', JSON.stringify(transactions));
  }

  // ─── LANGUAGE ────────────────────────────────────────────
  function toggleLang() {
    lang = lang === 'pl' ? 'en' : 'pl';
    document.getElementById('langBtn').textContent = lang === 'pl' ? 'EN' : 'PL';
    renderAll();
  }

  function t(pl, en) { return lang === 'pl' ? pl : en; }

  // ─── MONTH NAV ───────────────────────────────────────────
  function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    filterCat = 'all';
    renderAll();
  }

  function getMonthLabel() {
    const m = lang === 'pl' ? MONTHS_PL[currentMonth] : MONTHS_EN[currentMonth];
    return `${m} ${currentYear}`;
  }

  // ─── FILTER ───────────────────────────────────────────────
  function getMonthTx() {
    return transactions.filter(tx => {
      const d = new Date(tx.date);
      return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
    });
  }

  function getFilteredTx() {
    const monthTx = getMonthTx();
    if (filterCat === 'all') return monthTx;
    return monthTx.filter(tx => tx.category === filterCat);
  }

  // ─── MODAL ────────────────────────────────────────────────
  function openModal() {
    document.getElementById('overlay').classList.add('open');
    renderModal();
    document.getElementById('amountInput').focus();
  }

  function closeModal(e) {
    if (e.target === document.getElementById('overlay')) {
      document.getElementById('overlay').classList.remove('open');
    }
  }

  function setType(type) {
    selectedType = type;
    document.getElementById('btnExpense').classList.toggle('active', type === 'expense');
    document.getElementById('btnIncome').classList.toggle('active', type === 'income');
    renderCatGrid();
  }

  function renderModal() {
    document.getElementById('modalTitle').textContent = t('Nowa transakcja', 'New Transaction');
    document.getElementById('amountLabel').textContent = t('Kwota (zł)', 'Amount (PLN)');
    document.getElementById('descLabel').textContent = t('Opis', 'Description');
    document.getElementById('catLabel').textContent = t('Kategoria', 'Category');
    document.getElementById('expenseBtnText').textContent = t('Wydatek', 'Expense');
    document.getElementById('incomeBtnText').textContent = t('Przychód', 'Income');
    document.getElementById('submitBtn').textContent = t('✓ Dodaj', '✓ Add');
    renderCatGrid();
  }

  function renderCatGrid() {
    const grid = document.getElementById('catGrid');
    grid.innerHTML = '';
    CATEGORIES.forEach(cat => {
      const div = document.createElement('div');
      div.className = 'cat-option' + (selectedCat === cat.id ? ' selected' : '');
      div.innerHTML = `<div class="cat-option-icon">${cat.icon}</div><div class="cat-option-name">${t(cat.pl, cat.en)}</div>`;
      div.onclick = () => {
        selectedCat = cat.id;
        renderCatGrid();
      };
      grid.appendChild(div);
    });
  }

  // ─── ADD ──────────────────────────────────────────────────
  function addTransaction() {
    const amount = parseFloat(document.getElementById('amountInput').value);
    const desc = document.getElementById('descInput').value.trim();

    if (!amount || amount <= 0) {
      document.getElementById('amountInput').focus();
      return;
    }

    const cat = CATEGORIES.find(c => c.id === selectedCat);
    transactions.unshift({
      id: Date.now(),
      type: selectedType,
      amount,
      desc: desc || cat[lang],
      category: selectedCat,
      date: new Date().toISOString()
    });

    save();
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('amountInput').value = '';
    document.getElementById('descInput').value = '';
    renderAll();
  }

  // ─── DELETE ───────────────────────────────────────────────
  function deleteTransaction(id) {
    transactions = transactions.filter(tx => tx.id !== id);
    save();
    renderAll();
  }

  // ─── FORMAT ───────────────────────────────────────────────
  function fmt(n) {
    return n.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' zł';
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString(lang === 'pl' ? 'pl-PL' : 'en-GB', { day: 'numeric', month: 'short' });
  }

  // ─── RENDER ALL ───────────────────────────────────────────
  function renderAll() {
    // Header
    document.getElementById('appTitle').textContent = t('💰 Tracker Wydatków', '💰 Expense Tracker');
    document.getElementById('monthLabel').textContent = getMonthLabel();
    document.getElementById('fabText').textContent = t('Dodaj transakcję', 'Add transaction');
    document.getElementById('categoriesTitle').textContent = t('Kategorie', 'Categories');
    document.getElementById('txTitle').textContent = t('Ostatnie transakcje', 'Recent transactions');
    document.getElementById('balanceLabel').textContent = t('Saldo', 'Balance');
    document.getElementById('incomeLabel').textContent = t('Przychody', 'Income');
    document.getElementById('expenseLabel').textContent = t('Wydatki', 'Expenses');
    document.getElementById('txLabel').textContent = t('Transakcje', 'Transactions');

    // Totals
    const monthTx = getMonthTx();
    const income = monthTx.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
    const expense = monthTx.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
    const balance = income - expense;

    document.getElementById('balanceAmount').textContent = fmt(balance);
    document.getElementById('balanceAmount').style.color = balance >= 0 ? '#a5b4fc' : '#fca5a5';
    document.getElementById('incomeAmount').textContent = fmt(income);
    document.getElementById('expenseAmount').textContent = fmt(expense);
    document.getElementById('txCount').textContent = monthTx.length;

    // Progress bar
    const pw = document.getElementById('progressWrap');
    if (income > 0) {
      pw.style.display = 'block';
      const pct = Math.min(100, Math.round((expense / income) * 100));
      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.className = 'progress-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warning' : '');
      document.getElementById('progressLabel').textContent = t('Wydatki vs Przychody', 'Expenses vs Income');
      document.getElementById('progressPct').textContent = pct + '%';
    } else {
      pw.style.display = 'none';
    }

    // Mini chart (last 6 months)
    renderChart();

    // Category filter pills
    renderCategoryFilter(monthTx);

    // TX list
    renderTxList();
  }

  function renderChart() {
    const wrap = document.getElementById('chartWrap');
    const hasAny = transactions.length > 0;
    wrap.style.display = hasAny ? 'block' : 'none';
    if (!hasAny) return;

    const bars = document.getElementById('chartBars');
    bars.innerHTML = '';

    const months = [];
    for (let i = 5; i >= 0; i--) {
      let m = currentMonth - i;
      let y = currentYear;
      while (m < 0) { m += 12; y--; }
      months.push({ m, y });
    }

    const maxVal = months.reduce((max, { m, y }) => {
      const txs = transactions.filter(tx => {
        const d = new Date(tx.date);
        return d.getMonth() === m && d.getFullYear() === y;
      });
      const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      return Math.max(max, inc, exp);
    }, 1);

    months.forEach(({ m, y }) => {
      const txs = transactions.filter(tx => {
        const d = new Date(tx.date);
        return d.getMonth() === m && d.getFullYear() === y;
      });
      const inc = txs.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
      const exp = txs.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
      const mLabels = lang === 'pl' ? MONTHS_PL : MONTHS_EN;
      const label = mLabels[m].slice(0, 3);

      const group = document.createElement('div');
      group.className = 'bar-group';
      group.innerHTML = `
        <div class="bar income-bar" style="height:${Math.round((inc/maxVal)*50)}px"></div>
        <div class="bar expense-bar" style="height:${Math.round((exp/maxVal)*50)}px"></div>
        <div class="bar-label">${label}</div>
      `;
      bars.appendChild(group);
    });
  }

  function renderCategoryFilter(monthTx) {
    const scroll = document.getElementById('categoryFilter');
    scroll.innerHTML = '';

    const allPill = document.createElement('div');
    allPill.className = 'cat-pill' + (filterCat === 'all' ? ' active' : '');
    allPill.textContent = t('Wszystkie', 'All');
    allPill.onclick = () => { filterCat = 'all'; renderAll(); };
    scroll.appendChild(allPill);

    const usedCats = [...new Set(monthTx.map(tx => tx.category))];
    CATEGORIES.filter(c => usedCats.includes(c.id)).forEach(cat => {
      const pill = document.createElement('div');
      pill.className = 'cat-pill' + (filterCat === cat.id ? ' active' : '');
      pill.innerHTML = `${cat.icon} ${t(cat.pl, cat.en)}`;
      pill.onclick = () => { filterCat = cat.id; renderAll(); };
      scroll.appendChild(pill);
    });
  }

  function renderTxList() {
    const list = document.getElementById('txList');
    const filtered = getFilteredTx();

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">${t('Brak transakcji w tym miesiącu', 'No transactions this month')}</div>
        </div>`;
      return;
    }

    list.innerHTML = '';
    filtered.forEach(tx => {
      const cat = CATEGORIES.find(c => c.id === tx.category) || CATEGORIES[7];
      const item = document.createElement('div');
      item.className = 'tx-item';
      item.innerHTML = `
        <div class="tx-icon" style="background:${tx.type === 'income' ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)'}">${cat.icon}</div>
        <div class="tx-info">
          <div class="tx-name">${tx.desc}</div>
          <div class="tx-meta">${t(cat.pl, cat.en)} · ${fmtDate(tx.date)}</div>
        </div>
        <div class="tx-amount ${tx.type === 'income' ? 'pos' : 'neg'}">${tx.type === 'income' ? '+' : '−'}${fmt(tx.amount)}</div>
        <button class="tx-delete" onclick="deleteTransaction(${tx.id})">✕</button>
      `;
      list.appendChild(item);
    });
  }

  // ─── SERVICE WORKER ───────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  // ─── INIT ─────────────────────────────────────────────────
  // Add sample data if empty
  if (transactions.length === 0) {
    const now = new Date();
    const y = now.getFullYear();
    const m = now.getMonth();
    const sample = [
      { id: 1, type: 'income',  amount: 5800, desc: 'Wynagrodzenie / Salary',  category: 'salary',    date: new Date(y, m, 1).toISOString() },
      { id: 2, type: 'expense', amount: 1200, desc: 'Czynsz / Rent',           category: 'home',      date: new Date(y, m, 2).toISOString() },
      { id: 3, type: 'expense', amount: 340,  desc: 'Biedronka',               category: 'food',      date: new Date(y, m, 5).toISOString() },
      { id: 4, type: 'expense', amount: 89,   desc: 'Autobus / Bus pass',      category: 'transport', date: new Date(y, m, 6).toISOString() },
      { id: 5, type: 'expense', amount: 55,   desc: 'Apteka / Pharmacy',       category: 'health',    date: new Date(y, m, 9).toISOString() },
      { id: 6, type: 'expense', amount: 180,  desc: 'Netflix + Spotify',       category: 'fun',       date: new Date(y, m, 10).toISOString() },
    ];
    transactions = sample;
    save();
  }

  renderAll();

  // Enter key on amount input
  document.getElementById('amountInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('descInput').focus();
  });
  document.getElementById('descInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTransaction();
  });
</script>
</body>
</html>
